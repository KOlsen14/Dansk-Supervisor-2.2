services:
  - type: web
    name: dansk-supervisor-supabase-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TEXTS_TABLE
        value: texts
      - key: ACTION_API_KEY
        generateValue: true

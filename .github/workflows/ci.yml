name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: test-token
      GITHUB_OWNER: KOlsen14
      GITHUB_REPO: Dansk-Supervisor-2.2
      GITHUB_BRANCH: main
      ACTION_API_KEY: test-action-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
